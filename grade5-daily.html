<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>小学五年级数学计算练习</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#eef2f7;color:#111827;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif}.app{max-width:1040px;margin:auto;padding:18px 14px}.hero,.answersBox{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:18px;box-shadow:0 12px 32px rgba(15,23,42,.08);margin:0 auto 14px;max-width:1040px}h1{margin:0 0 8px;font-size:28px}.muted{color:#64748b;line-height:1.6}.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}button{border:0;border-radius:12px;background:#2563eb;color:#fff;font-weight:800;padding:11px 16px;cursor:pointer;font-size:15px}button.gray{background:#e5e7eb;color:#111827}button.green{background:#16a34a}.page{width:210mm;height:297mm;margin:18px auto;background:#fff;padding:10mm 10mm 8mm;box-shadow:0 8px 30px rgba(0,0,0,.16);overflow:hidden}.paper-title{text-align:center;font-size:21px;margin:0 0 5px;letter-spacing:1px}.info{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;font-size:12px;margin-bottom:5px}.note{font-size:11px;border:1px solid #d1d5db;border-radius:6px;background:#f9fafb;padding:4px 7px;margin-bottom:5px}h2{font-size:13px;margin:6px 0 4px;border-left:4px solid #111827;padding-left:6px;line-height:1.2}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px 8px}.q{font-size:12.5px;white-space:nowrap;border-bottom:1px solid #d1d5db;padding:1px 0 4px;line-height:1.2}.q b{display:inline-block;width:23px;color:#374151}.blank{display:inline-block;min-width:38px;border-bottom:1px solid #111;margin-left:4px}.footer{text-align:center;color:#64748b;font-size:10px;margin-top:6px}.ansGrid{display:grid;grid-template-columns:repeat(9,1fr);gap:6px;font-size:13px}.ans{border:1px solid #d1d5db;border-radius:6px;background:#f9fafb;padding:5px;text-align:center}@page{size:A4 portrait;margin:0}@media print{body{background:white}.app,.answersBox{display:none!important}.page{margin:0;box-shadow:none;width:210mm;height:297mm;padding:9mm 9mm 7mm;page-break-after:auto;overflow:hidden}.paper-title{font-size:20px}.info{font-size:12px}.note{font-size:11px}h2{font-size:13px;margin:5px 0 3px}.grid{gap:3.5px 7px}.q{font-size:12px;padding:1px 0 3px}.footer{font-size:9px}}@media(max-width:760px){.page{width:100%;height:auto;margin:12px 0;padding:12px}.grid{grid-template-columns:1fr}.answersBox{margin:0 14px 14px}.ansGrid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <h1>小学五年级数学计算练习</h1>
    <div class="muted">页面只保留当前一套题。打印时只打印题目页，控制为一张A4；答案在网页下方查看，不参与打印。</div>
    <div class="controls">
      <button class="green" onclick="window.print()">打印当前套题</button>
      <button onclick="newSet()">生成新一套</button>
      <button class="gray" onclick="resetToday()">恢复今日套题</button>
    </div>
  </div>
</div>
<div id="paper"></div>
<div class="answersBox" id="answersBox"></div>
<script>
function mulberry32(a){return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function rint(r,min,max){return Math.floor(r()*(max-min+1))+min}function choice(r,arr){return arr[Math.floor(r()*arr.length)]}
function todaySeed(){const d=new Date();const y=d.getFullYear();const start=new Date(y,0,0);return y*1000+Math.floor((d-start)/86400000)}
function makeSet(seed){const r=mulberry32(seed);const qs=[];let n=1;for(let i=0;i<15;i++){let a=rint(r,12,98),b=rint(r,12,98);qs.push({no:n++,type:'一、两位数乘两位数',text:`${a} × ${b}`,ans:a*b})}for(let i=0;i<15;i++){let kind=i%6,a,b,c,d,text,ans;if(kind===0){a=rint(r,20,180);b=rint(r,12,80);c=rint(r,2,9);text=`${a} + ${b} × ${c}`;ans=a+b*c}else if(kind===1){b=rint(r,2,9);c=rint(r,8,40);a=b*c;d=rint(r,20,90);text=`${a} ÷ ${b} + ${d}`;ans=a/b+d}else if(kind===2){a=rint(r,160,420);b=rint(r,12,55);c=rint(r,2,6);text=`${a} - ${b} × ${c}`;ans=a-b*c}else if(kind===3){b=rint(r,2,9);c=rint(r,12,50);a=b*c;d=rint(r,5,40);text=`${a} ÷ ${b} - ${d}`;ans=a/b-d}else if(kind===4){a=rint(r,12,45);b=rint(r,3,8);c=rint(r,30,160);text=`${a} × ${b} + ${c}`;ans=a*b+c}else{b=choice(r,[3,4,5,6,8]);c=rint(r,20,90);a=b*rint(r,20,80);text=`${a} ÷ ${b} + ${c}`;ans=a/b+c}qs.push({no:n++,type:'二、加减乘除混合运算',text,ans})}for(let i=0;i<15;i++){let kind=i%5,a,b,c,d,s,text,ans;if(kind===0){a=rint(r,20,90);b=rint(r,10,80);c=choice(r,[2,3,4,5,6,7,8,9]);s=a+b;s=s+(c-s%c)%c;text=`（${a} + ${s-a}）÷ ${c}`;ans=s/c}else if(kind===1){a=rint(r,80,180);b=rint(r,20,70);c=rint(r,2,6);text=`（${a} - ${b}）× ${c}`;ans=(a-b)*c}else if(kind===2){b=rint(r,2,8);c=rint(r,5,18);a=b*c;d=rint(r,2,9);text=`${a} ÷（${b+d} - ${d}）`;ans=a/b}else if(kind===3){a=rint(r,12,48);b=rint(r,12,48);c=rint(r,2,9);text=`（${a} + ${b}）× ${c}`;ans=(a+b)*c}else{b=rint(r,3,9);c=rint(r,5,16);d=rint(r,2,8);text=`${b*c*d} ÷（${b} × ${d}）`;ans=c}qs.push({no:n++,type:'三、带括号的四则混合运算',text,ans})}return qs}
function render(seed){localStorage.setItem('grade5_current_seed',seed);const qs=makeSet(seed);const date=new Date().toLocaleDateString('zh-CN');let html=`<section class="page"><h1 class="paper-title">小学五年级数学计算练习</h1><div class="info"><div>姓名：____________</div><div>日期：${date}</div><div>套题编号：${seed}</div></div><div class="note">共45题。要求：认真计算；先乘除，后加减；有括号先算括号。</div>`;['一、两位数乘两位数','二、加减乘除混合运算','三、带括号的四则混合运算'].forEach(t=>{html+=`<h2>${t}</h2><div class="grid">`;qs.filter(q=>q.type===t).forEach(q=>html+=`<div class="q"><b>${q.no}.</b>${q.text} = <span class="blank"></span></div>`);html+='</div>'});html+='<div class="footer">本页已按一张A4纸设计。答案请在网页下方查看。</div></section>';document.getElementById('paper').innerHTML=html;let ans='<h1 style="font-size:22px">参考答案（不打印）</h1><div class="ansGrid">';qs.forEach(q=>ans+=`<div class="ans">${q.no}. ${q.ans}</div>`);ans+='</div>';document.getElementById('answersBox').innerHTML=ans}
function newSet(){render(Math.floor(Math.random()*900000000)+100000)}function resetToday(){render(todaySeed())}
render(Number(localStorage.getItem('grade5_current_seed'))||todaySeed());
</script>
</body>
</html>
