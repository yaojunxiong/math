</main><nav class="keypad"><div class="keypad-inner"><button class="key" data-key="7">7</button><button class="key" data-key="8">8</button><button class="key" data-key="9">9</button><button class="key" data-key="4">4</button><button class="key" data-key="5">5</button><button class="key" data-key="6">6</button><button class="key" data-key="1">1</button><button class="key" data-key="2">2</button><button class="key" data-key="3">3</button><button class="key" data-key="0">0</button><button class="key delete" data-key="delete">⌫</button><button class="key confirm" data-key="confirm">OK</button></div></nav>

let locale=localStorage.getItem('math_locale')||'zh',googleUser=null,cloudReady=false,device=null,cloudMistakes={};

const E={statusPill:$('statusPill'),authText:$('authText'),authNote:$('authNote'),loginBtn:$('loginBtn'),logoutBtn:$('logoutBtn'),guestUserCard:$('guestUserCard'),currentIdentity:$('currentIdentity'),displayNameInput:$('displayNameInput'),profileNote:$('profileNote'),deviceInfo:$('deviceInfo'),userSelect:$('userSelect'),question:$('question'),answerDisplay:$('answerDisplay'),feedback:$('feedback'),statCount:$('statCount'),statCorrect:$('statCorrect'),statAccuracy:$('statAccuracy'),statAvg:$('statAvg'),progressText:$('progressText'),timerText:$('timerText'),barFill:$('barFill'),summary:$('summary'),summaryText:$('summaryText'),mistakeList:$('mistakeList'),historyBody:$('historyBody'),leaderboardBody:$('leaderboardBody'),mistakeBank:$('mistakeBank'),mistakeOwner:$('mistakeOwner')};
function tr(k){return I[locale][k]||k}function applyLang(){document.documentElement.lang=locale==='zh'?'zh-CN':'en';document.querySelectorAll('[data-i18n]').forEach(x=>x.textContent=tr(x.dataset.i18n));$('langBtn').textContent=locale==='zh'?'English':'中文';E.loginBtn.textContent=tr('login');E.logoutBtn.textContent=tr('logout');$('modeTwoDigit').textContent=modeNames[locale].twoDigit;$('modeTable').textContent=modeNames[locale].table;$('modeHard').textContent=modeNames[locale].hard;$('modeMistakes').textContent=modeNames[locale].mistakes;renderAuth();renderRecords();renderQuestion();}
function defaultData(){return{currentUserId:'u_junjun',users:[...defaultUsers],histories:[],mistakesByUser:{u_junjun:{},u_rourou:{}}}}function loadLocal(){try{return normalize(JSON.parse(localStorage.getItem(APP_KEY)))}catch{return defaultData()}}function saveLocal(d){localStorage.setItem(APP_KEY,JSON.stringify(normalize(d)))}function normalize(d){if(!d||!Array.isArray(d.users))d=defaultData();d.histories=d.histories||[];d.mistakesByUser=d.mistakesByUser||{};defaultUsers.forEach(u=>{if(!d.users.some(x=>x.id===u.id))d.users.push(u);if(!d.mistakesByUser[u.id])d.mistakesByUser[u.id]={}});if(!d.currentUserId||!d.users.some(u=>u.id===d.currentUserId))d.currentUserId='u_junjun';return d}
function activeUserId(){return googleUser&&cloudReady?googleUser.id:(state.currentUserId||loadLocal().currentUserId)}function activeUserName(){if(googleUser&&cloudReady)return googleUser.user_metadata?.full_name||googleUser.email;let d=loadLocal();return d.users.find(u=>u.id===activeUserId())?.name||'User'}function isCloud(){return !!googleUser&&cloudReady}function localMistakes(){let d=loadLocal();return d.mistakesByUser[activeUserId()]||{}}function getMistakes(){return isCloud()?cloudMistakes:localMistakes()}function setLocalMistakes(m){let d=loadLocal();d.mistakesByUser[activeUserId()]=m;saveLocal(d)}
async function fingerprint(){let raw=[navigator.userAgent,navigator.language,navigator.platform,screen.width,screen.height,Intl.DateTimeFormat().resolvedOptions().timeZone].join('|');let buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(raw));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,32)}

async function initAuth(){await registerDevice();const {data:{session}}=await sb.auth.getSession();await applySession(session);sb.auth.onAuthStateChange(async(_,s)=>applySession(s));}
async function applySession(s){googleUser=s?.user||null;cloudReady=false;if(googleUser){try{await upsertProfile();cloudReady=true;await registerDevice();await loadCloudMistakes();}catch(e){console.warn(e);}}renderAuth();renderUsers();renderProfile();renderRecords();startNewSet();}
async function upsertProfile(){let m=googleUser.user_metadata||{};await sb.from('profiles').upsert({id:googleUser.id,email:googleUser.email,display_name:m.full_name||m.name||googleUser.email,avatar_url:m.avatar_url||m.picture||null,locale},{onConflict:'id'});}async function login(){await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.origin+location.pathname}})}async function logout(){await sb.auth.signOut();googleUser=null;cloudReady=false;renderAuth();startNewSet();}

function renderUsers(){let d=loadLocal();state.currentUserId=d.currentUserId;E.userSelect.innerHTML=d.users.map(u=>`<option value="${u.id}" ${u.id===d.currentUserId?'selected':''}>${u.name}</option>`).join('')}function renderProfile(){E.currentIdentity.textContent=activeUserName();E.displayNameInput.value=activeUserName();E.profileNote.textContent=isCloud()?tr('savedCloud'):tr('savedLocal')}
async function saveName(){let name=E.displayNameInput.value.trim();if(!name)return;if(isCloud()){await sb.from('profiles').upsert({id:googleUser.id,email:googleUser.email,display_name:name,locale},{onConflict:'id'});googleUser.user_metadata.full_name=name}else{let d=loadLocal();let u=d.users.find(x=>x.id===activeUserId());if(u)u.name=name;saveLocal(d)}renderUsers();renderProfile();renderRecords();startNewSet();}

async function loadCloudMistakes(){let {data}=await sb.from('math_mistake_facts').select('*').eq('user_id',googleUser.id).eq('is_resolved',false);cloudMistakes={};(data||[]).forEach(m=>cloudMistakes[`${m.a}×${m.b}`]={a:m.a,b:m.b,answer:m.answer,wrong:m.wrong_count,slow:m.slow_count,rightStreak:m.right_streak,lastTime:m.updated_at});}
function q(a,b){return{a,b,answer:a*b}}function r(min,max){return Math.floor(Math.random()*(max-min+1))+min}function keyOf(x){return `${x.a}×${x.b}`}function poolTwo(){let p=[];for(let a=2;a<=49;a++)for(let b=2;b<=9;b++){let ans=a*b;if(ans>=10&&ans<=99)p.push(q(a,b))}return p}function poolTable(){let p=[];for(let a=2;a<=9;a++)for(let b=2;b<=9;b++)p.push(q(a,b));return p}const hard=[[6,7],[7,6],[6,8],[8,6],[7,8],[8,7],[7,9],[9,7],[8,9],[9,8],[6,6],[7,7],[8,8],[9,9],[4,8],[8,4],[3,9],[9,3]];function poolHard(){let p=hard.map(x=>q(x[0],x[1]));for(let a=11;a<=24;a++)for(let b=3;b<=8;b++){let ans=a*b;if(ans<=99)p.push(q(a,b))}return p}function poolMistakes(){let vals=Object.values(getMistakes());if(!vals.length)return poolTwo();let w=[];vals.forEach(m=>{for(let i=0;i<Math.min(9,2+(m.wrong||1)+(m.slow||0));i++)w.push(q(m.a,m.b))});return w}

function setMode(m){state.mode=m;['TwoDigit','Table','Hard','Mistakes'].forEach(x=>$('mode'+x).classList.remove('active'));({twoDigit:'modeTwoDigit',table:'modeTable',hard:'modeHard',mistakes:'modeMistakes'}[m]&&$({twoDigit:'modeTwoDigit',table:'modeTable',hard:'modeHard',mistakes:'modeMistakes'}[m]).classList.add('active'));startNewSet();}
function startNewSet(){clearInterval(state.timer);Object.assign(state,{questions:generate(),index:0,input:'',correct:0,answers:[],startedAt:Date.now(),currentStartedAt:Date.now(),finished:false});E.summary.classList.remove('show');E.feedback.textContent=`${activeUserName()}，${locale==='zh'?'输入答案后点确认。':'enter the answer and tap OK.'}`;state.timer=setInterval(updateTimer,500);renderQuestion();updateStats();}
function cq(){return state.questions[state.index]}function renderQuestion(){let x=cq();if(!x)return;E.question.textContent=`${x.a} × ${x.b}`;E.answerDisplay.textContent=state.input||' ';E.progressText.textContent=`${activeUserName()} · ${state.index+1}/${TOTAL}`;E.barFill.style.width=`${state.index/TOTAL*100}%`}function updateTimer(){let sec=Math.floor((Date.now()-state.startedAt)/1000);E.timerText.textContent=`${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`}function updateStats(){let done=state.answers.length,acc=done?Math.round(state.correct/done*100):0,avg=done?(state.answers.reduce((s,a)=>s+a.time,0)/done/1000).toFixed(1):'0';E.statCount.textContent=`${done}/${TOTAL}`;E.statCorrect.textContent=state.correct;E.statAccuracy.textContent=acc+'%';E.statAvg.textContent=avg+'s'}function digit(d){if(state.finished)startNewSet();if(state.input.length<3){state.input+=d;E.answerDisplay.textContent=state.input}}function del(){state.input=state.input.slice(0,-1);E.answerDisplay.textContent=state.input||' '}
async function saveMistake(x,ok,time){let ms={...getMistakes()},k=keyOf(x),slow=time>5000;if(!ms[k])ms[k]={a:x.a,b:x.b,answer:x.answer,wrong:0,slow:0,rightStreak:0,lastTime:0};let it=ms[k];it.lastTime=Date.now();if(ok){it.rightStreak++;if(slow)it.slow++;if(it.rightStreak>=3&&!slow)delete ms[k]}else{it.wrong++;it.rightStreak=0}if(isCloud()){cloudMistakes=ms;if(ms[k])await sb.from('math_mistake_facts').upsert({user_id:googleUser.id,device_id:device?.id||null,a:x.a,b:x.b,answer:x.answer,wrong_count:ms[k].wrong,slow_count:ms[k].slow,right_streak:ms[k].rightStreak,is_resolved:false,updated_at:new Date().toISOString()},{onConflict:'user_id,a,b'});}else{setLocalMistakes(ms);if(ms[k])await sb.from('math_mistake_facts').upsert({guest_user_id:activeUserId(),guest_user_name:activeUserName(),device_id:device?.id||null,a:x.a,b:x.b,answer:x.answer,wrong_count:ms[k].wrong,slow_count:ms[k].slow,right_streak:ms[k].rightStreak,is_resolved:false,updated_at:new Date().toISOString()},{onConflict:'guest_user_id,device_id,a,b'}).catch(console.warn)}renderMistakeBank();}
async function confirm(){let x=cq();if(!x||!state.input)return;let ua=Number(state.input),time=Date.now()-state.currentStartedAt,ok=ua===x.answer;if(ok)state.correct++;await saveMistake(x,ok,time);state.answers.push({...x,userAnswer:ua,ok,time,userId:activeUserId(),userName:activeUserName(),deviceId:device?.id||null});E.feedback.className=ok?'feedback good':'feedback bad';E.feedback.textContent=ok?`✅ ${x.a}×${x.b}=${x.answer}`:`${x.a}×${x.b}=${x.answer}`;updateStats();setTimeout(()=>{state.index++;state.input='';state.currentStartedAt=Date.now();if(state.index>=TOTAL)finishSet();else{E.feedback.className='feedback';E.feedback.textContent=tr('continue');renderQuestion()}},ok?300:850)}
async function finishSet(){state.finished=true;clearInterval(state.timer);let sec=Math.floor((Date.now()-state.startedAt)/1000);E.barFill.style.width='100%';E.question.textContent=locale==='zh'?'完成！':'Done!';E.answerDisplay.textContent='🎉';await saveHistory(sec);renderSummary(sec);await renderRecords();}
async function saveHistory(sec){let done=state.answers.length,acc=done?Math.round(state.correct/done*100):0,avg=done?Number((state.answers.reduce((s,a)=>s+a.time,0)/done/1000).toFixed(1)):0;let payload={user_id:isCloud()?googleUser.id:null,guest_user_id:isCloud()?null:activeUserId(),guest_user_name:isCloud()?null:activeUserName(),device_id:device?.id||null,mode:state.mode,total_questions:done,correct_count:state.correct,accuracy:acc,total_seconds:sec,avg_seconds:avg,wrong_count:state.answers.filter(a=>!a.ok).length,locale,details:state.answers};let {error}=await sb.from('math_test_results').insert(payload).catch(e=>({error:e}));if(error){let d=loadLocal();d.histories.unshift({id:'h_'+Date.now(),userId:activeUserId(),userName:activeUserName(),mode:state.mode,date:new Date().toISOString(),total:done,correct:state.correct,accuracy:acc,seconds:sec,avg});saveLocal(d)}}
function renderSummary(sec){let done=state.answers.length,acc=done?Math.round(state.correct/done*100):0,avg=done?(state.answers.reduce((s,a)=>s+a.time,0)/done/1000).toFixed(1):'0';E.summary.classList.add('show');E.summaryText.textContent=`${activeUserName()}: ${state.correct}/${done}, ${acc}%, ${sec}s, ${avg}s/q`;let list=state.answers.filter(a=>!a.ok||a.time>5000).slice(0,24);E.mistakeList.innerHTML=list.length?list.map(x=>`<div class="item">${x.a}×${x.b}=${x.answer}<br><span class="label">${x.ok?'slow':'wrong'}</span></div>`).join(''):`<div class="item">${tr('noMistakes')}</div>`}
async function renderRecords(){if(isCloud())await loadCloudMistakes().catch(console.warn);await renderHistory();await renderLeaderboard();renderMistakeBank();}function fmtDate(x){return x?new Date(x).toLocaleString():''}function fmtTime(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`}
async function renderHistory(){let rows=[];let q=isCloud()?sb.from('math_test_results').select('*').eq('user_id',googleUser.id):sb.from('math_test_results').select('*').eq('guest_user_id',activeUserId());let {data,error}=await q.eq('is_deleted',false).order('created_at',{ascending:false}).limit(30).catch(e=>({error:e}));if(!error&&data)rows=data;else rows=loadLocal().histories.filter(h=>h.userId===activeUserId());E.historyBody.innerHTML=rows.length?rows.map(h=>`<tr><td>${fmtDate(h.created_at||h.date)}</td><td>${h.guest_user_name||h.userName||activeUserName()}</td><td>${modeNames[locale][h.mode]||h.mode}</td><td>${h.correct_count??h.correct}/${h.total_questions??h.total}</td><td>${h.accuracy}%</td><td>${fmtTime(h.total_seconds??h.seconds)}</td><td>${h.avg_seconds??h.avg}s</td></tr>`).join(''):`<tr><td colspan="7">${tr('noHistory')}</td></tr>`}
async function renderLeaderboard(){let {data,error}=await sb.from('math_test_results').select('*,profiles(display_name)').eq('is_deleted',false).order('accuracy',{ascending:false}).order('correct_count',{ascending:false}).order('total_seconds',{ascending:true}).limit(20).catch(e=>({error:e}));let rows=!error&&data?data:loadLocal().histories.sort((a,b)=>b.accuracy-a.accuracy||b.correct-a.correct||a.seconds-b.seconds).slice(0,20);E.leaderboardBody.innerHTML=rows.length?rows.map((h,i)=>`<tr><td>${i+1}</td><td>${h.profiles?.display_name||h.guest_user_name||h.userName||h.user_id||''}</td><td>${modeNames[locale][h.mode]||h.mode}</td><td>${h.correct_count??h.correct}/${h.total_questions??h.total}</td><td>${h.accuracy}%</td><td>${fmtTime(h.total_seconds??h.seconds)}</td><td>${h.avg_seconds??h.avg}s</td></tr>`).join(''):'<tr><td colspan="7">-</td></tr>'}
function renderMistakeBank(){let vals=Object.values(getMistakes()).sort((a,b)=>(b.wrong||0)-(a.wrong||0));E.mistakeOwner.textContent=`${tr('mistakes')}: ${activeUserName()} · ${device?.device_fingerprint||'local'}`;E.mistakeBank.innerHTML=vals.length?vals.map(m=>`<div class="item">${m.a}×${m.b}=${m.answer}<br><span class="label">${m.wrong||0} wrong · ${m.slow||0} slow</span></div>`).join(''):`<div class="item">${tr('noMistakes')}</div>`}
async function showAnswer(){let x=cq();if(!x)return;E.feedback.className='feedback bad';E.feedback.textContent=`${x.a}×${x.b}=${x.answer}`;await saveMistake(x,false,9999)}function clearMistakes(){if(isCloud()){cloudMistakes={}}else setLocalMistakes({});renderMistakeBank()}function showTab(name){['History','Leaderboard','Mistakes'].forEach(x=>{$('tab'+x).classList.remove('active');$('panel'+x).classList.remove('show')});$('tab'+name).classList.add('active');$('panel'+name).classList.add('show')}
E.loginBtn.onclick=login;E.logoutBtn.onclick=logout;$('langBtn').onclick=()=>{locale=locale==='zh'?'en':'zh';localStorage.setItem('math_locale',locale);applyLang()};$('saveNameBtn').onclick=saveName;$('addUserBtn').onclick=addUser;E.userSelect.onchange=e=>switchUser(e.target.value);$('modeTwoDigit').onclick=()=>setMode('twoDigit');$('modeTable').onclick=()=>setMode('table');$('modeHard').onclick=()=>setMode('hard');$('modeMistakes').onclick=()=>setMode('mistakes');$('newSetBtn').onclick=startNewSet;$('showAnswerBtn').onclick=showAnswer;$('clearBtn').onclick=clearMistakes;$('tabHistory').onclick=()=>showTab('History');$('tabLeaderboard').onclick=()=>showTab('Leaderboard');$('tabMistakes').onclick=()=>showTab('Mistakes');document.querySelectorAll('[data-key]').forEach(b=>b.onclick=()=>{let k=b.dataset.key;if(/^\d$/.test(k))digit(k);else if(k==='delete')del();else confirm()});window.addEventListener('keydown',e=>{if(/^\d$/.test(e.key))digit(e.key);if(e.key==='Backspace')del();if(e.key==='Enter')confirm()});
