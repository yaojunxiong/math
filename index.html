<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>YOYO 乘法速记训练器</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #182033;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --good: #16a34a;
      --bad: #dc2626;
      --warn: #f59e0b;
      --border: #e5e7eb;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top left, #dbeafe 0, transparent 30%), var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px 14px 120px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(24px, 5vw, 42px);
      letter-spacing: -0.04em;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .pill {
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      padding: 9px 12px;
      border-radius: 999px;
      font-weight: 700;
      white-space: nowrap;
    }

    .card {
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(229,231,235,.88);
      border-radius: 26px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 13px 14px;
      background: #eef2ff;
      color: #1e293b;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform .08s ease, filter .2s ease, background .2s ease;
    }

    button:active { transform: scale(.97); }
    button.primary { background: var(--primary); color: white; }
    button.primary:hover { background: var(--primary-dark); }
    button.success { background: #dcfce7; color: #166534; }
    button.danger { background: #fee2e2; color: #991b1b; }
    button.warn { background: #fef3c7; color: #92400e; }
    button.active { background: var(--primary); color: white; }
    button:disabled { opacity: .45; cursor: not-allowed; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .stat {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 12px;
      text-align: center;
    }

    .stat .label { color: var(--muted); font-size: 13px; }
    .stat .value { font-size: 25px; font-weight: 900; margin-top: 3px; }

    .question-card {
      text-align: center;
      padding: 20px 16px 18px;
    }

    .progress-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 16px;
    }

    .bar {
      flex: 1;
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #60a5fa, #2563eb);
      border-radius: 999px;
      transition: width .2s ease;
    }

    .question {
      font-size: clamp(54px, 14vw, 118px);
      line-height: 1;
      font-weight: 950;
      letter-spacing: -0.06em;
      margin: 12px 0;
    }

    .answer-display {
      min-height: 72px;
      border: 3px dashed #cbd5e1;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 950;
      margin: 16px auto 12px;
      max-width: 340px;
      background: #f8fafc;
    }

    .feedback {
      min-height: 34px;
      font-size: 22px;
      font-weight: 900;
    }

    .feedback.good { color: var(--good); }
    .feedback.bad { color: var(--bad); }

    .keypad {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      padding: 10px max(12px, env(safe-area-inset-left)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-right));
      box-shadow: 0 -10px 35px rgba(15, 23, 42, .10);
      z-index: 10;
    }

    .keypad-inner {
      max-width: 580px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .key {
      font-size: 26px;
      padding: 15px 8px;
      border-radius: 20px;
      background: #f1f5f9;
    }

    .key.confirm { background: var(--primary); color: white; }
    .key.delete { background: #fee2e2; color: #991b1b; }

    .summary {
      display: none;
    }

    .summary.show { display: block; }

    .mistake-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .mistake-item {
      border: 1px solid var(--border);
      background: #f8fafc;
      border-radius: 16px;
      padding: 10px;
      font-weight: 900;
      text-align: center;
    }

    .small-note {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      margin: 8px 0 0;
    }

    @media (max-width: 760px) {
      header { align-items: flex-start; flex-direction: column; }
      .mode-grid, .stats { grid-template-columns: repeat(2, 1fr); }
      .app { padding-bottom: 245px; }
      .keypad-inner { max-width: none; }
      .key { padding: 18px 8px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="brand">
        <h1>YOYO 乘法速记训练器</h1>
        <p>目标：看到题目，快速从脑中取出答案，又快又准。</p>
      </div>
      <div class="pill">iPad / MacBook 可用</div>
    </header>

    <section class="card">
      <div class="mode-grid">
        <button id="modeTwoDigit" class="active">两位数专项</button>
        <button id="modeTable">99乘法表</button>
        <button id="modeHard">难点专项</button>
        <button id="modeMistakes">只练错题</button>
      </div>
      <p class="small-note">统一使用大按钮数字键盘。MacBook 也可以直接按数字、Enter、Backspace。</p>
    </section>

    <section class="card stats">
      <div class="stat"><div class="label">题目</div><div id="statCount" class="value">0/45</div></div>
      <div class="stat"><div class="label">正确</div><div id="statCorrect" class="value">0</div></div>
      <div class="stat"><div class="label">正确率</div><div id="statAccuracy" class="value">0%</div></div>
      <div class="stat"><div class="label">平均用时</div><div id="statAvg" class="value">0s</div></div>
    </section>

    <section class="card question-card">
      <div class="progress-line">
        <span id="progressText">准备开始</span>
        <div class="bar"><div id="barFill"></div></div>
        <span id="timerText">00:00</span>
      </div>
      <div id="question" class="question">Ready?</div>
      <div id="answerDisplay" class="answer-display"> </div>
      <div id="feedback" class="feedback">选择模式后，点“再来一组”开始。</div>
      <div class="mode-grid" style="margin-top:14px; grid-template-columns: repeat(3, 1fr);">
        <button id="newSetBtn" class="primary">再来一组</button>
        <button id="showAnswerBtn" class="warn">显示答案</button>
        <button id="clearBtn" class="danger">清空错题</button>
      </div>
    </section>

    <section id="summary" class="card summary">
      <h2 style="margin:0 0 8px;">本轮结果</h2>
      <p id="summaryText" style="font-size:18px;font-weight:800;margin:0 0 8px;"></p>
      <div id="mistakeList" class="mistake-list"></div>
    </section>
  </main>

  <nav class="keypad" aria-label="数字键盘">
    <div class="keypad-inner">
      <button class="key" data-key="7">7</button>
      <button class="key" data-key="8">8</button>
      <button class="key" data-key="9">9</button>
      <button class="key" data-key="4">4</button>
      <button class="key" data-key="5">5</button>
      <button class="key" data-key="6">6</button>
      <button class="key" data-key="1">1</button>
      <button class="key" data-key="2">2</button>
      <button class="key" data-key="3">3</button>
      <button class="key" data-key="0">0</button>
      <button class="key delete" data-key="delete">删除</button>
      <button class="key confirm" data-key="confirm">确认</button>
    </div>
  </nav>

  <script>
    const TOTAL = 45;
    const STORAGE_KEY = 'yoyo-math-mistakes-v1';

    const state = {
      mode: 'twoDigit',
      questions: [],
      index: 0,
      input: '',
      correct: 0,
      answers: [],
      startedAt: null,
      currentStartedAt: null,
      timer: null,
      finished: false,
    };

    const hardFacts = [
      [6,7], [7,6], [6,8], [8,6], [7,8], [8,7], [7,9], [9,7], [8,9], [9,8],
      [6,6], [7,7], [8,8], [9,9], [4,8], [8,4], [3,9], [9,3]
    ];

    const els = {
      question: document.getElementById('question'),
      answerDisplay: document.getElementById('answerDisplay'),
      feedback: document.getElementById('feedback'),
      statCount: document.getElementById('statCount'),
      statCorrect: document.getElementById('statCorrect'),
      statAccuracy: document.getElementById('statAccuracy'),
      statAvg: document.getElementById('statAvg'),
      progressText: document.getElementById('progressText'),
      timerText: document.getElementById('timerText'),
      barFill: document.getElementById('barFill'),
      summary: document.getElementById('summary'),
      summaryText: document.getElementById('summaryText'),
      mistakeList: document.getElementById('mistakeList'),
    };

    function getMistakes() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }

    function saveMistakes(mistakes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(mistakes));
    }

    function keyOf(q) { return `${q.a}×${q.b}`; }

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function makeQuestion(a, b) {
      return { a, b, answer: a * b };
    }

    function generateTwoDigitPool() {
      const pool = [];
      for (let a = 2; a <= 49; a++) {
        for (let b = 2; b <= 9; b++) {
          const ans = a * b;
          if (ans >= 10 && ans <= 99) pool.push(makeQuestion(a, b));
        }
      }
      return pool;
    }

    function generateTablePool() {
      const pool = [];
      for (let a = 2; a <= 9; a++) {
        for (let b = 2; b <= 9; b++) pool.push(makeQuestion(a, b));
      }
      return pool;
    }

    function generateHardPool() {
      const pool = [];
      hardFacts.forEach(([a,b]) => pool.push(makeQuestion(a,b)));
      for (let a = 11; a <= 24; a++) {
        for (let b = 3; b <= 8; b++) {
          const ans = a * b;
          if (ans >= 10 && ans <= 99) pool.push(makeQuestion(a,b));
        }
      }
      return pool;
    }

    function generateMistakePool() {
      const mistakes = getMistakes();
      const items = Object.values(mistakes).map(m => makeQuestion(m.a, m.b));
      if (items.length === 0) return generateTwoDigitPool();
      const weighted = [];
      Object.values(mistakes).forEach(m => {
        const weight = Math.min(8, 2 + (m.wrong || 1) + (m.slow || 0));
        for (let i = 0; i < weight; i++) weighted.push(makeQuestion(m.a, m.b));
      });
      return weighted;
    }

    function generateQuestions() {
      let pool;
      if (state.mode === 'table') pool = generateTablePool();
      else if (state.mode === 'hard') pool = generateHardPool();
      else if (state.mode === 'mistakes') pool = generateMistakePool();
      else pool = generateTwoDigitPool();

      const mistakes = getMistakes();
      const weighted = [...pool];

      if (state.mode !== 'mistakes') {
        Object.values(mistakes).forEach(m => {
          const q = makeQuestion(m.a, m.b);
          const weight = Math.min(6, 1 + (m.wrong || 1));
          for (let i = 0; i < weight; i++) weighted.push(q);
        });
      }

      const selected = [];
      let safety = 0;
      while (selected.length < TOTAL && safety < 1000) {
        safety++;
        const q = weighted[randInt(0, weighted.length - 1)];
        const recent = selected.slice(-6).some(x => x.a === q.a && x.b === q.b);
        if (!recent) selected.push({ ...q });
      }
      return selected;
    }

    function setMode(mode) {
      state.mode = mode;
      document.querySelectorAll('.mode-grid button').forEach(btn => btn.classList.remove('active'));
      const idMap = { twoDigit: 'modeTwoDigit', table: 'modeTable', hard: 'modeHard', mistakes: 'modeMistakes' };
      document.getElementById(idMap[mode]).classList.add('active');
      startNewSet();
    }

    function startNewSet() {
      clearInterval(state.timer);
      state.questions = generateQuestions();
      state.index = 0;
      state.input = '';
      state.correct = 0;
      state.answers = [];
      state.finished = false;
      state.startedAt = Date.now();
      state.currentStartedAt = Date.now();
      els.summary.classList.remove('show');
      els.feedback.className = 'feedback';
      els.feedback.textContent = '输入答案，然后点确认。';
      state.timer = setInterval(updateTimer, 500);
      renderQuestion();
      updateStats();
    }

    function currentQuestion() {
      return state.questions[state.index];
    }

    function renderQuestion() {
      const q = currentQuestion();
      if (!q) return finishSet();
      els.question.textContent = `${q.a} × ${q.b}`;
      els.answerDisplay.textContent = state.input || ' ';
      els.progressText.textContent = `第 ${state.index + 1} / ${TOTAL} 题`;
      els.barFill.style.width = `${(state.index / TOTAL) * 100}%`;
    }

    function updateTimer() {
      if (!state.startedAt || state.finished) return;
      const seconds = Math.floor((Date.now() - state.startedAt) / 1000);
      const m = String(Math.floor(seconds / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      els.timerText.textContent = `${m}:${s}`;
    }

    function updateStats() {
      const done = state.answers.length;
      const acc = done ? Math.round((state.correct / done) * 100) : 0;
      const avg = done ? (state.answers.reduce((sum, a) => sum + a.time, 0) / done / 1000).toFixed(1) : '0';
      els.statCount.textContent = `${done}/${TOTAL}`;
      els.statCorrect.textContent = String(state.correct);
      els.statAccuracy.textContent = `${acc}%`;
      els.statAvg.textContent = `${avg}s`;
    }

    function handleDigit(digit) {
      if (state.finished || !currentQuestion()) startNewSet();
      if (state.input.length >= 3) return;
      state.input += digit;
      els.answerDisplay.textContent = state.input;
    }

    function handleDelete() {
      state.input = state.input.slice(0, -1);
      els.answerDisplay.textContent = state.input || ' ';
    }

    function handleConfirm() {
      const q = currentQuestion();
      if (!q || state.finished) return;
      if (state.input.trim() === '') {
        els.feedback.className = 'feedback bad';
        els.feedback.textContent = '先输入答案哦。';
        return;
      }

      const userAnswer = Number(state.input);
      const time = Date.now() - state.currentStartedAt;
      const ok = userAnswer === q.answer;
      if (ok) state.correct++;

      updateMistakeMemory(q, ok, time);

      state.answers.push({ ...q, userAnswer, ok, time });
      els.feedback.className = ok ? 'feedback good' : 'feedback bad';
      els.feedback.textContent = ok ? `正确 ✅  ${q.a}×${q.b}=${q.answer}` : `再记一次：${q.a}×${q.b}=${q.answer}`;
      updateStats();

      setTimeout(() => {
        state.index++;
        state.input = '';
        state.currentStartedAt = Date.now();
        if (state.index >= TOTAL) finishSet();
        else {
          els.feedback.className = 'feedback';
          els.feedback.textContent = '继续，加油！';
          renderQuestion();
        }
      }, ok ? 350 : 900);
    }

    function updateMistakeMemory(q, ok, time) {
      const mistakes = getMistakes();
      const key = keyOf(q);
      const slow = time > 5000;

      if (!mistakes[key]) {
        mistakes[key] = { a: q.a, b: q.b, answer: q.answer, wrong: 0, rightStreak: 0, slow: 0, lastTime: 0 };
      }

      const item = mistakes[key];
      item.lastTime = Date.now();

      if (ok) {
        item.rightStreak = (item.rightStreak || 0) + 1;
        if (slow) item.slow = (item.slow || 0) + 1;
        if (item.rightStreak >= 3 && !slow) delete mistakes[key];
      } else {
        item.wrong = (item.wrong || 0) + 1;
        item.rightStreak = 0;
      }

      saveMistakes(mistakes);
    }

    function finishSet() {
      state.finished = true;
      clearInterval(state.timer);
      updateTimer();
      els.barFill.style.width = '100%';
      els.question.textContent = '完成！';
      els.answerDisplay.textContent = '🎉';
      els.feedback.className = 'feedback good';
      els.feedback.textContent = '做完啦！看看本轮结果。';
      renderSummary();
    }

    function renderSummary() {
      const done = state.answers.length;
      const acc = done ? Math.round((state.correct / done) * 100) : 0;
      const totalSeconds = Math.floor((Date.now() - state.startedAt) / 1000);
      const avg = done ? (state.answers.reduce((sum, a) => sum + a.time, 0) / done / 1000).toFixed(1) : '0';
      const wrong = state.answers.filter(a => !a.ok);
      const slow = state.answers.filter(a => a.ok && a.time > 5000);

      els.summary.classList.add('show');
      els.summaryText.textContent = `得分：${state.correct}/${done}，正确率：${acc}%，用时：${Math.floor(totalSeconds/60)}分${totalSeconds%60}秒，平均每题：${avg}秒。`;

      const list = [...wrong, ...slow].slice(0, 24);
      if (list.length === 0) {
        els.mistakeList.innerHTML = '<div class="mistake-item">本轮没有明显错题 ✅</div>';
      } else {
        els.mistakeList.innerHTML = list.map(x => `<div class="mistake-item">${x.a}×${x.b}=${x.answer}<br><span style="color:#64748b;font-size:13px;">${x.ok ? '答对但偏慢' : '做错'}</span></div>`).join('');
      }
    }

    function showAnswer() {
      const q = currentQuestion();
      if (!q) return;
      els.feedback.className = 'feedback bad';
      els.feedback.textContent = `记住：${q.a}×${q.b}=${q.answer}`;
      updateMistakeMemory(q, false, 9999);
    }

    function clearMistakes() {
      localStorage.removeItem(STORAGE_KEY);
      els.feedback.className = 'feedback good';
      els.feedback.textContent = '错题记录已清空。';
      els.summary.classList.remove('show');
    }

    document.getElementById('modeTwoDigit').addEventListener('click', () => setMode('twoDigit'));
    document.getElementById('modeTable').addEventListener('click', () => setMode('table'));
    document.getElementById('modeHard').addEventListener('click', () => setMode('hard'));
    document.getElementById('modeMistakes').addEventListener('click', () => setMode('mistakes'));
    document.getElementById('newSetBtn').addEventListener('click', startNewSet);
    document.getElementById('showAnswerBtn').addEventListener('click', showAnswer);
    document.getElementById('clearBtn').addEventListener('click', clearMistakes);

    document.querySelectorAll('[data-key]').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.key;
        if (/^\d$/.test(key)) handleDigit(key);
        else if (key === 'delete') handleDelete();
        else if (key === 'confirm') handleConfirm();
      });
    });

    window.addEventListener('keydown', (e) => {
      if (/^\d$/.test(e.key)) handleDigit(e.key);
      if (e.key === 'Backspace') handleDelete();
      if (e.key === 'Enter') handleConfirm();
    });

    startNewSet();
  </script>
</body>
</html>
