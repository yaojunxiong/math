<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Math Admin</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f6f7fb;color:#172033}.app{max-width:1220px;margin:auto;padding:18px}.card{background:white;border:1px solid #e5e7eb;border-radius:22px;padding:16px;margin:12px 0;box-shadow:0 12px 32px rgba(15,23,42,.08)}button{border:0;border-radius:14px;padding:11px 14px;background:#2563eb;color:white;font-weight:800;cursor:pointer}button.gray{background:#e2e8f0;color:#172033}button.red{background:#dc2626}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.tabs{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.tabs button{background:#eef2ff;color:#1e293b}.tabs button.active{background:#2563eb;color:#fff}table{width:100%;border-collapse:separate;border-spacing:0 8px;min-width:980px}td,th{text-align:left;padding:10px;background:#f8fafc;border-top:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;white-space:nowrap}td:first-child,th:first-child{border-left:1px solid #e5e7eb;border-radius:12px 0 0 12px}td:last-child,th:last-child{border-right:1px solid #e5e7eb;border-radius:0 12px 12px 0}.wrap{overflow:auto}.small{color:#64748b;font-size:13px}.hidden{display:none!important}input,select{border:1px solid #e5e7eb;border-radius:12px;padding:10px;background:#fff}.ok{color:#16a34a;font-weight:900}.bad{color:#dc2626;font-weight:900}.warn{color:#d97706;font-weight:900}.diag-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin-top:10px}.diag-card{border:1px solid #e5e7eb;border-radius:18px;background:#f8fafc;padding:12px}.diag-num{font-size:24px;font-weight:950;margin-top:4px}@media(max-width:820px){.tabs{grid-template-columns:repeat(2,1fr)}}</style></head><body><main class="app"><header class="row"><div><h1 id="title">后台管理</h1><p id="sub" class="small">管理测试数据、个人信息、排行榜、错题、设备、访问记录和系统状态。</p></div><button id="langBtn" class="gray">English</button><button id="loginBtn">Google 登录</button><button id="logoutBtn" class="red hidden">退出</button><a href="./index.html" style="font-weight:800">返回练习页</a></header><section class="card"><div id="authText">未登录。后台需要 Google 登录。</div><p class="small">访问记录表 site_visit_logs 为共用表：math 与 minna/TypingJapaneseWords 都写到这里，用 site_code 区分。</p></section><section id="adminArea" class="hidden"><section class="card"><div class="tabs"><button class="active" data-tab="diagnostics">系统状态</button><button data-tab="visits">访问记录</button><button data-tab="results">测试数据</button><button data-tab="profiles">个人信息</button><button data-tab="leaderboard">排行榜</button><button data-tab="mistakes">错题</button><button data-tab="devices">设备</button></div></section><section class="card"><div class="row"><label>条数 <select id="limit"><option>20</option><option>50</option><option>100</option></select></label><label>站点 <select id="siteFilter"><option value="">全部</option><option value="math">math</option><option value="minna">minna</option></select></label><button id="refreshBtn">刷新</button></div></section><section class="card"><div id="panelTitle" style="font-size:22px;font-weight:900">系统状态</div><div id="diagSummary"></div><div class="wrap"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div></section></section></main><script>const SUPABASE_URL='https://ycjuceortcduakxscfes.supabase.co';const SUPABASE_ANON_KEY='sb_publishable_sK-XWyiFwSoKCorddBULCw_0yiS9e5t';const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);let user=null,tab='diagnostics',locale='zh';const $=id=>document.getElementById(id);const i18n={zh:{title:'后台管理',sub:'管理测试数据、个人信息、排行榜、错题、设备、访问记录和系统状态。',login:'Google 登录',logout:'退出',diagnostics:'系统状态',visits:'访问记录',results:'测试数据',profiles:'个人信息',leaderboard:'排行榜',mistakes:'错题',devices:'设备',refresh:'刷新'},en:{title:'Admin Panel',sub:'Manage test data, profiles, leaderboard, mistakes, devices, visit logs, and diagnostics.',login:'Sign in with Google',logout:'Sign out',diagnostics:'Diagnostics',visits:'Visit Logs',results:'Test Data',profiles:'Profiles',leaderboard:'Leaderboard',mistakes:'Mistakes',devices:'Devices',refresh:'Refresh'}};function t(k){return i18n[locale][k]||k}function applyLang(){document.documentElement.lang=locale==='zh'?'zh-CN':'en';$('title').textContent=t('title');$('sub').textContent=t('sub');$('loginBtn').textContent=t('login');$('logoutBtn').textContent=t('logout');$('refreshBtn').textContent=t('refresh');document.querySelectorAll('[data-tab]').forEach(b=>b.textContent=t(b.dataset.tab));$('langBtn').textContent=locale==='zh'?'English':'中文'}async function init(){const {data:{session}}=await sb.auth.getSession();await applySession(session);sb.auth.onAuthStateChange(async(_,s)=>applySession(s));applyLang()}async function applySession(session){user=session?.user||null;if(!user){$('authText').textContent='未登录。后台需要 Google 登录。';$('adminArea').classList.add('hidden');$('loginBtn').classList.remove('hidden');$('logoutBtn').classList.add('hidden');return}$('authText').textContent='已登录：'+user.email;$('adminArea').classList.remove('hidden');$('loginBtn').classList.add('hidden');$('logoutBtn').classList.remove('hidden');await load()}function fmt(x){return x==null?'':String(x)}function fmtDate(x){return x?new Date(x).toLocaleString():''}function render(headers,rows){$('thead').innerHTML='<tr>'+headers.map(h=>'<th>'+h+'</th>').join('')+'</tr>';$('tbody').innerHTML=rows.length?rows.map(r=>'<tr>'+r.map(c=>'<td>'+fmt(c)+'</td>').join('')+'</tr>').join(''):'<tr><td colspan="'+headers.length+'">暂无数据</td></tr>'}function clearDiag(){ $('diagSummary').innerHTML=''; }function statusText(error,count){if(error)return '<span class="bad">FAIL</span>';return '<span class="ok">OK</span> · '+count+' rows'}async function checkTable(name,orderCol){try{const {count,error}=await sb.from(name).select('*',{count:'exact',head:true});let latest='';if(!error){let q=sb.from(name).select('*').limit(1);if(orderCol)q=q.order(orderCol,{ascending:false});const r=await q;latest=r.data&&r.data[0]?(r.data[0].created_at||r.data[0].visited_at||r.data[0].updated_at||r.data[0].last_seen_at||'') : ''}return {table:name,status:error?'FAIL':'OK',count:error?'-':count,latest,error:error?error.message:''}}catch(e){return {table:name,status:'FAIL',count:'-',latest:'',error:e.message||String(e)}}}async function loadDiagnostics(){const checks=await Promise.all([checkTable('profiles','created_at'),checkTable('math_devices','last_seen_at'),checkTable('math_test_results','created_at'),checkTable('math_mistake_facts','updated_at'),checkTable('site_visit_logs','visited_at')]);let ok=checks.filter(x=>x.status==='OK').length;let bad=checks.length-ok;let latestVisit=await sb.from('site_visit_logs').select('*').order('visited_at',{ascending:false}).limit(1).catch(e=>({error:e}));let latestResult=await sb.from('math_test_results').select('*').order('created_at',{ascending:false}).limit(1).catch(e=>({error:e}));let latestMistake=await sb.from('math_mistake_facts').select('*').order('updated_at',{ascending:false}).limit(1).catch(e=>({error:e}));$('diagSummary').innerHTML='<div class="diag-grid"><div class="diag-card"><div class="small">Supabase URL</div><div class="diag-num">'+SUPABASE_URL.replace('https://','')+'</div></div><div class="diag-card"><div class="small">当前登录</div><div class="diag-num">'+(user?user.email:'-')+'</div></div><div class="diag-card"><div class="small">表状态</div><div class="diag-num"><span class="ok">'+ok+' OK</span> / <span class="bad">'+bad+' FAIL</span></div></div><div class="diag-card"><div class="small">最近访问</div><div class="diag-num">'+fmtDate(latestVisit.data?.[0]?.visited_at)+'</div></div><div class="diag-card"><div class="small">最近测试</div><div class="diag-num">'+fmtDate(latestResult.data?.[0]?.created_at)+'</div></div><div class="diag-card"><div class="small">最近错题</div><div class="diag-num">'+fmtDate(latestMistake.data?.[0]?.updated_at)+'</div></div></div>';render(['Table','Status','Count','Latest','Error / Suggestion'],checks.map(x=>[x.table,x.status==='OK'?'<span class="ok">OK</span>':'<span class="bad">FAIL</span>',x.count,fmtDate(x.latest),x.error||'正常']))}async function load(){if(!user)return;const limit=Number($('limit').value||20);$('panelTitle').textContent=t(tab);clearDiag();if(tab==='diagnostics'){await loadDiagnostics();return}if(tab==='visits'){let q=sb.from('site_visit_logs').select('*').order('visited_at',{ascending:false}).limit(limit);const site=$('siteFilter').value;if(site)q=q.eq('site_code',site);const {data,error}=await q;if(error){render(['Error'],[[error.message]]);return}render(['ID','Visited','Site','Page','User','Guest','Device','Lang','Platform','Screen','Referrer'],(data||[]).map(x=>[x.id,fmtDate(x.visited_at),x.site_code,x.page_title||x.page_path,fmt(x.user_id),x.guest_user_name||x.guest_user_id,x.device_fingerprint,x.language,x.platform,(x.screen_width||'')+'×'+(x.screen_height||''),x.referrer]))}else if(tab==='results'){const {data,error}=await sb.from('math_test_results').select('*').order('created_at',{ascending:false}).limit(limit);if(error){render(['Error'],[[error.message]]);return}render(['ID','Time','User','Guest','Mode','Score','Accuracy','Seconds','Device','Deleted'],(data||[]).map(x=>[x.id,fmtDate(x.created_at),fmt(x.user_id),fmt(x.guest_user_name||x.guest_user_id),x.mode,`${x.correct_count}/${x.total_questions}`,x.accuracy+'%',x.total_seconds,fmt(x.device_id),x.is_deleted?'Y':'']))}else if(tab==='profiles'){const {data,error}=await sb.from('profiles').select('*').order('created_at',{ascending:false}).limit(limit);if(error){render(['Error'],[[error.message]]);return}render(['ID','Email','Name','Role','Locale','Created'],(data||[]).map(x=>[x.id,x.email,x.display_name,x.role,x.locale,fmtDate(x.created_at)]))}else if(tab==='leaderboard'){const {data,error}=await sb.from('math_test_results').select('*').eq('is_deleted',false).order('accuracy',{ascending:false}).order('correct_count',{ascending:false}).order('total_seconds',{ascending:true}).limit(limit);if(error){render(['Error'],[[error.message]]);return}render(['Rank','User/Guest','Mode','Score','Accuracy','Seconds','Avg','Time'],(data||[]).map((x,i)=>[i+1,x.guest_user_name||x.user_id,x.mode,`${x.correct_count}/${x.total_questions}`,x.accuracy+'%',x.total_seconds,x.avg_seconds,fmtDate(x.created_at)]))}else if(tab==='mistakes'){const {data,error}=await sb.from('math_mistake_facts').select('*').order('updated_at',{ascending:false}).limit(limit);if(error){render(['Error'],[[error.message]]);return}render(['ID','User','Guest','Fact','Answer','Wrong','Slow','Streak','Resolved','Device','Updated'],(data||[]).map(x=>[x.id,fmt(x.user_id),x.guest_user_name||x.guest_user_id,`${x.a}×${x.b}`,x.answer,x.wrong_count,x.slow_count,x.right_streak,x.is_resolved?'Y':'',fmt(x.device_id),fmtDate(x.updated_at)]))}else if(tab==='devices'){const {data,error}=await sb.from('math_devices').select('*').order('last_seen_at',{ascending:false}).limit(limit);if(error){render(['Error'],[[error.message]]);return}render(['ID','User','Guest','Fingerprint','Platform','Lang','Screen','Timezone','Last Seen'],(data||[]).map(x=>[x.id,fmt(x.user_id),x.guest_user_name||x.guest_user_id,x.device_fingerprint,x.platform,x.language,`${x.screen_width}×${x.screen_height}`,x.timezone,fmtDate(x.last_seen_at)]))}}$('loginBtn').onclick=()=>sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.origin+location.pathname}});$('logoutBtn').onclick=()=>sb.auth.signOut();$('refreshBtn').onclick=load;$('limit').onchange=load;$('siteFilter').onchange=load;$('langBtn').onclick=()=>{locale=locale==='zh'?'en':'zh';applyLang();load()};document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-tab]').forEach(x=>x.classList.remove('active'));b.classList.add('active');tab=b.dataset.tab;load()});init();</script></body></html>
